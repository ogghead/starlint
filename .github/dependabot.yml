version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      oxc:
        patterns: ["oxc_*"]
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
