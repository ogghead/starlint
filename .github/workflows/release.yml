name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            binary: starlint
            npm-dir: cli-linux-x64-gnu

          - name: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            binary: starlint
            npm-dir: cli-linux-arm64-gnu
            cross: true

          - name: darwin-x64
            target: x86_64-apple-darwin
            runner: macos-14
            binary: starlint
            npm-dir: cli-darwin-x64

          - name: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-14
            binary: starlint
            npm-dir: cli-darwin-arm64

          - name: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: starlint.exe
            npm-dir: cli-win32-x64-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package starlint_cli

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} staging/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: staging/${{ matrix.binary }}
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify versions
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Expected version: $VERSION"

          ROOT_VERSION=$(node -p "require('./npm/starlint/package.json').version")
          if [ "$ROOT_VERSION" != "$VERSION" ]; then
            echo "::error::Root package.json version ($ROOT_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

          for dir in npm/cli-*/; do
            PKG_VERSION=$(node -p "require('./$dir/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::$dir version ($PKG_VERSION) does not match tag ($VERSION)"
              exit 1
            fi
          done

          echo "All versions match: $VERSION"

      - name: Stage binaries into npm packages
        run: |
          cp artifacts/binary-linux-x64-gnu/starlint       npm/cli-linux-x64-gnu/starlint
          cp artifacts/binary-linux-arm64-gnu/starlint      npm/cli-linux-arm64-gnu/starlint
          cp artifacts/binary-darwin-x64/starlint           npm/cli-darwin-x64/starlint
          cp artifacts/binary-darwin-arm64/starlint         npm/cli-darwin-arm64/starlint
          cp artifacts/binary-win32-x64-msvc/starlint.exe  npm/cli-win32-x64-msvc/starlint.exe

          chmod +x npm/cli-linux-x64-gnu/starlint
          chmod +x npm/cli-linux-arm64-gnu/starlint
          chmod +x npm/cli-darwin-x64/starlint
          chmod +x npm/cli-darwin-arm64/starlint

      - name: Prepare root package
        run: |
          cp README.md npm/starlint/README.md
          cp LICENSE npm/starlint/LICENSE

      - name: Smoke test (linux-x64)
        run: |
          cd npm/cli-linux-x64-gnu && npm pack && cd ../..
          cd npm/starlint && npm pack && cd ../..

          mkdir -p /tmp/smoke-test && cd /tmp/smoke-test
          npm init -y
          npm install $GITHUB_WORKSPACE/npm/starlint/starlint-*.tgz \
                      $GITHUB_WORKSPACE/npm/cli-linux-x64-gnu/starlint-cli-linux-x64-gnu-*.tgz

          npx starlint --version
          echo "Smoke test passed"

      - name: Publish platform packages
        run: |
          for dir in npm/cli-*/; do
            echo "Publishing $(node -p "require('./$dir/package.json').name")..."
            npm publish "$dir" --provenance --access public
          done

      - name: Publish root package
        run: npm publish npm/starlint/ --provenance --access public

  vscode-publish:
    name: Publish VS Code extension
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify version
        working-directory: editors/vscode
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          EXT_VERSION=$(node -p "require('./package.json').version")
          if [ "$EXT_VERSION" != "$VERSION" ]; then
            echo "::error::VS Code extension version ($EXT_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "Version verified: $VERSION"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Package extension
        working-directory: editors/vscode
        run: npx @vscode/vsce package --no-git-tag-version -o starlint-${{ needs.version.outputs.version }}.vsix

      - name: Publish to VS Code Marketplace
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-git-tag-version -p "$VSCE_PAT"

      - name: Publish to OpenVSX
        working-directory: editors/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish starlint-${{ needs.version.outputs.version }}.vsix -p "$OVSX_PAT"

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: editors/vscode/starlint-${{ needs.version.outputs.version }}.vsix
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: [version, build, publish, vscode-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ needs.version.outputs.version }}"

          tar czf "release-assets/starlint-v${VERSION}-linux-x64-gnu.tar.gz" \
            -C artifacts/binary-linux-x64-gnu starlint

          tar czf "release-assets/starlint-v${VERSION}-linux-arm64-gnu.tar.gz" \
            -C artifacts/binary-linux-arm64-gnu starlint

          tar czf "release-assets/starlint-v${VERSION}-darwin-x64.tar.gz" \
            -C artifacts/binary-darwin-x64 starlint

          tar czf "release-assets/starlint-v${VERSION}-darwin-arm64.tar.gz" \
            -C artifacts/binary-darwin-arm64 starlint

          cd artifacts/binary-win32-x64-msvc
          zip "../../release-assets/starlint-v${VERSION}-win32-x64-msvc.zip" starlint.exe
          cd ../..

          # VS Code extension
          cp artifacts/vscode-extension/starlint-${VERSION}.vsix release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: starlint ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
