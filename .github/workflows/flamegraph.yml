name: Flamegraph

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flamegraph
  cancel-in-progress: true

jobs:
  flamegraph:
    name: Generate flamegraph
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf and cargo-flamegraph
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null \
            || sudo apt-get install -y linux-tools-azure 2>/dev/null \
            || sudo apt-get install -y linux-tools-generic
          # Workaround: ubuntu-latest kernel 6.14 lacks matching linux-tools package.
          # The /usr/bin/perf wrapper fails with "perf not found for kernel X.Y.Z".
          # Symlink whatever perf binary was installed to the expected path.
          PERF_BIN=$(find /usr/lib/linux-tools/ -name perf -type f 2>/dev/null | head -1)
          if [ -n "$PERF_BIN" ]; then
            KVER=$(uname -r)
            sudo mkdir -p "/usr/lib/linux-tools/$KVER"
            sudo ln -sf "$PERF_BIN" "/usr/lib/linux-tools/$KVER/perf"
          fi
          cargo install flamegraph --locked

      - name: Allow perf events
        run: sudo sysctl kernel.perf_event_paranoid=-1

      - name: Cache benchmark corpora
        uses: actions/cache@v4
        with:
          path: benches/corpora
          key: bench-corpora-v1

      - name: Clone grafana corpus
        run: |
          if [ ! -d benches/corpora/grafana ]; then
            mkdir -p benches/corpora
            git clone --depth 1 --filter=blob:none --sparse \
              https://github.com/grafana/grafana.git benches/corpora/grafana
            cd benches/corpora/grafana && git sparse-checkout set public/app
          fi

      - name: Build release binary
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"
        run: cargo build --release --bin starlint

      - name: Verify perf works
        run: perf stat -e cpu-clock -- sleep 0.1

      - name: Generate flamegraph
        run: |
          set +e
          fg_err=$(RAYON_NUM_THREADS=2 flamegraph \
            --ignore-status \
            -o flamegraph.svg \
            -- target/release/starlint \
               --config benches/configs/starlint-default.toml \
               --no-plugins \
               benches/corpora/grafana 2>&1)
          exit_code=$?
          set -e
          if [ -f flamegraph.svg ] && [ -s flamegraph.svg ]; then
            echo "Flamegraph size: $(du -h flamegraph.svg | cut -f1)"
          else
            echo "::warning::flamegraph stderr: $fg_err"
            echo "::error::flamegraph.svg not generated (exit $exit_code)"
            exit 1
          fi

      - name: Upload flamegraph
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph-${{ github.sha }}
          path: flamegraph.svg
          retention-days: 90
