name: Flamegraph

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flamegraph
  cancel-in-progress: true

jobs:
  flamegraph:
    name: Generate flamegraph
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf and cargo-flamegraph
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null \
            || sudo apt-get install -y linux-tools-azure 2>/dev/null \
            || sudo apt-get install -y linux-tools-generic
          cargo install flamegraph --locked

      - name: Allow perf events
        run: sudo sysctl kernel.perf_event_paranoid=-1

      - name: Cache benchmark corpora
        uses: actions/cache@v4
        with:
          path: benches/corpora
          key: bench-corpora-v1

      - name: Clone grafana corpus
        run: |
          if [ ! -d benches/corpora/grafana ]; then
            mkdir -p benches/corpora
            git clone --depth 1 --filter=blob:none --sparse \
              https://github.com/grafana/grafana.git benches/corpora/grafana
            cd benches/corpora/grafana && git sparse-checkout set public/app
          fi

      - name: Build release binary
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"
        run: cargo build --release --bin starlint

      - name: Generate flamegraph
        run: |
          echo "::warning::flamegraph=$(which flamegraph 2>&1) perf=$(which perf 2>&1)"
          echo "::warning::binary=$(ls -la target/release/starlint 2>&1)"
          perf_test=$(perf record -e cpu-clock -g -o /tmp/test.perf -- sleep 0.1 2>&1) && echo "::warning::perf-test=OK" || echo "::warning::perf-test=FAILED: $perf_test"
          set +e
          fg_output=$(RAYON_NUM_THREADS=2 flamegraph \
            -v \
            --cmd "record -e cpu-clock -F 997 -g" \
            --ignore-status \
            -o flamegraph.svg \
            -- target/release/starlint \
               --config benches/configs/starlint-default.toml \
               --no-plugins \
               benches/corpora/grafana 2>&1)
          exit_code=$?
          set -e
          echo "::warning::flamegraph-exit=$exit_code output=$fg_output"
          if [ -f flamegraph.svg ] && [ -s flamegraph.svg ]; then
            echo "::notice::Flamegraph generated: $(du -h flamegraph.svg | cut -f1)"
          else
            echo "::error::flamegraph.svg not generated (exit $exit_code)"
            exit 1
          fi

      - name: Upload flamegraph
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph-${{ github.sha }}
          path: flamegraph.svg
          retention-days: 90
