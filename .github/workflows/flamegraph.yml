name: Flamegraph

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flamegraph
  cancel-in-progress: true

jobs:
  flamegraph:
    name: Generate flamegraph
    # Pin to ubuntu-22.04: ubuntu-latest (24.04) runs kernel 6.14 which
    # lacks matching linux-tools packages (Ubuntu bug #2117159).
    runs-on: ubuntu-22.04
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf and cargo-flamegraph
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) \
            || sudo apt-get install -y linux-tools-generic
          cargo install flamegraph --locked

      - name: Allow perf events
        run: sudo sysctl kernel.perf_event_paranoid=-1

      - name: Cache benchmark corpora
        uses: actions/cache@v4
        with:
          path: benches/corpora
          key: bench-corpora-v1

      - name: Clone grafana corpus
        run: |
          if [ ! -d benches/corpora/grafana ]; then
            mkdir -p benches/corpora
            git clone --depth 1 --filter=blob:none --sparse \
              https://github.com/grafana/grafana.git benches/corpora/grafana
            cd benches/corpora/grafana && git sparse-checkout set public/app
          fi

      - name: Build release binary
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"
        run: cargo build --release --bin starlint

      - name: Generate flamegraph
        run: |
          set +e
          RAYON_NUM_THREADS=2 flamegraph \
            --ignore-status \
            -o flamegraph.svg \
            -- target/release/starlint \
               --config benches/configs/starlint-default.toml \
               --no-plugins \
               benches/corpora/grafana 2>&1
          exit_code=$?
          set -e
          if [ -f flamegraph.svg ] && [ -s flamegraph.svg ]; then
            echo "Flamegraph size: $(du -h flamegraph.svg | cut -f1)"
          else
            echo "::error::flamegraph.svg not generated (flamegraph exit code: $exit_code)"
            exit 1
          fi

      - name: Upload flamegraph artifact
        uses: actions/upload-artifact@v7
        with:
          name: flamegraph-${{ github.sha }}
          path: flamegraph.svg
          retention-days: 90

      - name: Publish flamegraph to assets branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Save SVG outside the working tree before resetting
          cp flamegraph.svg /tmp/flamegraph.svg
          # Create orphan branch with only the SVG
          git checkout --orphan flamegraph-assets-tmp
          git rm -rf .
          cp /tmp/flamegraph.svg flamegraph.svg
          git add flamegraph.svg
          git commit -m "Update flamegraph from ${{ github.sha }}"
          git push origin flamegraph-assets-tmp:flamegraph-assets --force
