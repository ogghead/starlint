[package]
name = "starlint_core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Core linting engine for starlint"

[dependencies]
starlint_parser = { workspace = true }
starlint_plugin_sdk = { workspace = true }
starlint_scope = { workspace = true }
starlint_config = { workspace = true }
starlint_rule_framework = { workspace = true }

miette = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
