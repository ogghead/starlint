starlint-plugin-core = { workspace = true }
starlint-plugin-react = { workspace = true }
starlint-plugin-typescript = { workspace = true }
starlint-plugin-testing = { workspace = true }
starlint-plugin-modules = { workspace = true }
starlint-plugin-nextjs = { workspace = true }
starlint-plugin-vue = { workspace = true }
