coverage:
  status:
    project:
      default:
        target: auto     # compare against base commit — no regression allowed
        threshold: 0%
        if_ci_failed: error
    patch:
      default:
        target: 95%      # new/changed lines must be ≥95% covered
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "benches/**"
  - "examples/**"
  - "crates/starlint_cli/src/main.rs"
